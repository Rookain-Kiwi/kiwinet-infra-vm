# ─────────────────────────────────────────────
# roles/ufw/tasks/main.yml
# Rôle : ufw — Configuration du firewall
#
# Ports ouverts :
#   22    TCP  → SSH
#   80    TCP  → HTTP (Let's Encrypt HTTP Challenge + redirection HTTPS)
#   443   TCP  → HTTPS (Traefik)
#   25565 TCP  → Minecraft (TCP passthrough Traefik)
#   1883  TCP  → MQTT Mosquitto (LAN uniquement — restreint)
#   22121 UDP  → WireGuard VPN (Freebox Delta natif)
# ─────────────────────────────────────────────

# ── Installation ─────────────────────────────

- name: "Installation de ufw"
  ansible.builtin.apt:
    name: ufw
    state: present

# ── Politique par défaut ─────────────────────

- name: "Politique par défaut : refus entrant, autorisation sortant"
  community.general.ufw:
    direction: "{{ item.direction }}"
    default: "{{ item.policy }}"
  loop:
    - { direction: incoming, policy: deny }
    - { direction: outgoing, policy: allow }

# ── Règles entrantes ─────────────────────────

- name: "Autorisation SSH (port 22 TCP)"
  community.general.ufw:
    rule: allow
    port: "22"
    proto: tcp
    comment: "SSH - acces administrateur"

- name: "Autorisation HTTP (port 80 TCP)"
  community.general.ufw:
    rule: allow
    port: "80"
    proto: tcp
    comment: "HTTP - Challenge Let's Encrypt + redirection HTTPS"

- name: "Autorisation HTTPS (port 443 TCP)"
  community.general.ufw:
    rule: allow
    port: "443"
    proto: tcp
    comment: "HTTPS - Traefik reverse proxy"

- name: "Autorisation Minecraft (port 25565 TCP)"
  community.general.ufw:
    rule: allow
    port: "25565"
    proto: tcp
    comment: "Minecraft - TCP passthrough Traefik"

- name: "Autorisation WireGuard (port 22121 UDP)"
  community.general.ufw:
    rule: allow
    port: "22121"
    proto: udp
    comment: "WireGuard VPN - Freebox Delta natif"

- name: "Restriction MQTT Mosquitto au reseau local uniquement"
  community.general.ufw:
    rule: allow
    port: "1883"
    proto: tcp
    src: 192.168.1.0/24
    comment: "MQTT Mosquitto - LAN uniquement"

# ── Activation ───────────────────────────────

- name: "Activation de ufw"
  community.general.ufw:
    state: enabled
    logging: "on"
