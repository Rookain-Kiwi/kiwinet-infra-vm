# ─────────────────────────────────────────────
# inventory.ini — Inventaire des hôtes Ansible
# Projet : kiwinet-infra-ansible
#
# Deux groupes cibles :
#   [freebox] — VM résidentielle Debian ARM64 (Freebox Delta)
#   [cloud]   — VPS Scaleway x86_64 (fr-par-1)
#
# Note SSH cloud : port 22 au premier run (avant hardening Ansible).
# Mettre à jour ansible_port=2222 après passage du playbook-cloud.yml.
# ─────────────────────────────────────────────

[freebox]
kiwinet-vm ansible_host=kiwinet.me ansible_port=22

[cloud]
kiwinet-cloud ansible_host=<IP_FLEXIBLE> ansible_port=22

[freebox:vars]
ansible_python_interpreter=/usr/bin/python3

[cloud:vars]
ansible_python_interpreter=/usr/bin/python3
ansible_user=root
ansible_ssh_private_key_file=~/.ssh/kiwinet_deploy