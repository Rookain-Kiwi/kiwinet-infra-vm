# ─────────────────────────────────────────────
# roles/kiwinet-vps/tasks/main.yml
# Rôle : kiwinet-vps — Déploiement de Traefik sur le VPS Scaleway
#
# Responsabilités :
#   1. Création du répertoire /opt/kiwinet-services
#   2. Clone du repo kiwinet-services (HTTPS — repo public)
#   3. Authentification GHCR (docker login) pour CI/CD kiwinet-web
#   4. Vérification de la présence de acme.vps.json (chmod 600)
#   5. Démarrage de la stack Traefik VPS
#
# Prérequis manuels AVANT ce rôle (non automatisables) :
#   - acme.vps.json présent et chmod 600 dans /opt/kiwinet-services/traefik/
#     touch /opt/kiwinet-services/traefik/acme.vps.json
#     chmod 600 /opt/kiwinet-services/traefik/acme.vps.json
#   - Variable ghcr_pat définie (ex: ansible-playbook ... -e ghcr_pat=<PAT>)
#     ou stockée dans Ansible Vault
#
# Note : le rôle kiwinet-web a déjà effectué meta: reset_connection
# en amont dans playbook-cloud.yml — pas besoin de le rejouer ici.
# ─────────────────────────────────────────────

# ── Répertoire /opt ───────────────────────────

- name: "Création du répertoire /opt/kiwinet-services"
  ansible.builtin.file:
    path: /opt/kiwinet-services
    state: directory
    owner: rookain
    group: rookain
    mode: "0755"

# ── Clone du repo ─────────────────────────────

- name: "Clone du repo kiwinet-services (Traefik, Plex, Minecraft, HA)"
  ansible.builtin.git:
    repo: https://github.com/Rookain-Kiwi/kiwinet-services.git
    dest: /opt/kiwinet-services
    version: main
    update: false
  become_user: rookain

# ── Authentification GHCR ─────────────────────
# Requis pour que la CI/CD (docker compose pull) puisse tirer l'image
# ghcr.io/rookain-kiwi/kiwinet-web depuis le VPS.
# Le PAT kiwinet-ghcr-push (rotation : 14/07/2026) doit être fourni
# via la variable ghcr_pat (extra-vars ou Ansible Vault).

- name: "Authentification Docker sur GHCR"
  community.docker.docker_login:
    registry_url: ghcr.io
    username: Rookain-Kiwi
    password: "{{ ghcr_pat }}"
    reauthorize: false
  become_user: rookain
  when: ghcr_pat is defined

- name: "Avertissement si ghcr_pat non défini"
  ansible.builtin.debug:
    msg: >
      ATTENTION : la variable ghcr_pat n'est pas définie.
      Le VPS ne pourra pas puller l'image GHCR — la CI/CD échouera.
      Relancer avec : ansible-playbook ... -e ghcr_pat=<PAT>
  when: ghcr_pat is not defined

# ── Vérification secrets ──────────────────────

- name: "Vérification de la présence de acme.vps.json"
  ansible.builtin.stat:
    path: /opt/kiwinet-services/traefik/acme.vps.json
  register: acme_vps

- name: "Avertissement si acme.vps.json absent"
  ansible.builtin.debug:
    msg: >
      ATTENTION : /opt/kiwinet-services/traefik/acme.vps.json est absent.
      Créer le fichier avant de relancer ce rôle :
      touch /opt/kiwinet-services/traefik/acme.vps.json
      chmod 600 /opt/kiwinet-services/traefik/acme.vps.json
  when: not acme_vps.stat.exists

- name: "Vérification des permissions de acme.vps.json (chmod 600 requis)"
  ansible.builtin.file:
    path: /opt/kiwinet-services/traefik/acme.vps.json
    mode: "0600"
  when: acme_vps.stat.exists

# ── Démarrage de la stack ─────────────────────

- name: "Démarrage de la stack Traefik VPS"
  community.docker.docker_compose_v2:
    project_src: /opt/kiwinet-services/traefik
    files:
      - docker-compose.vps.yml
    state: present
  become_user: rookain
  when: acme_vps.stat.exists
