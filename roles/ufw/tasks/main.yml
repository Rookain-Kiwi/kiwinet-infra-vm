# ─────────────────────────────────────────────
# roles/ufw/tasks/main.yml
# Rôle : ufw — Configuration du firewall
#
# Les règles entrantes sont définies par la variable ufw_rules
# dans le playbook appelant (playbook-freebox.yml ou playbook-cloud.yml).
#
# Structure attendue pour chaque règle :
#   - port    : numéro de port (string)
#   - proto   : tcp ou udp
#   - comment : description de la règle
#   - src     : (optionnel) restriction à une IP ou un CIDR
# ─────────────────────────────────────────────

# ── Installation ─────────────────────────────

- name: "Installation de ufw"
  ansible.builtin.apt:
    name: ufw
    state: present

# ── Politique par défaut ─────────────────────

- name: "Politique par défaut : refus entrant, autorisation sortant"
  community.general.ufw:
    direction: "{{ item.direction }}"
    default: "{{ item.policy }}"
  loop:
    - { direction: incoming, policy: deny }
    - { direction: outgoing, policy: allow }

# ── Règles entrantes ─────────────────────────

- name: "Application des règles UFW"
  community.general.ufw:
    rule: allow
    port: "{{ item.port }}"
    proto: "{{ item.proto }}"
    src: "{{ item.src | default(omit) }}"
  loop: "{{ ufw_rules }}"

# ── Activation ───────────────────────────────

- name: "Activation de ufw"
  community.general.ufw:
    state: enabled
    logging: "on"